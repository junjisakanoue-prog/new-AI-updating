name: 毎朝のAI情報収集とデプロイ

on:
  schedule:
    # 19:00 UTC = 翌 04:00 JST。
    # GitHub Actions の cron は混雑時に 5〜20 分ほど遅延することがあるため、
    # 「5:00 までに更新」を確実にするよう 1 時間の余裕を取っている。
    - cron: '0 19 * * *'
  workflow_dispatch: {}   # 手動実行用（初回はこれで動作確認する）

# Pages へのデプロイに必要な権限
permissions:
  contents: write   # 生成した記事を data/ にコミットする
  pages: write
  id-token: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # ステップの if で参照するため、ジョブレベルで env に置く。
    # （ステップレベルの env は、そのステップ自身の if からは参照できないため）
    env:
      MAIL_APP_PASSWORD: ${{ secrets.MAIL_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: 収集して記事を生成
        env:
          # Settings > Secrets に ANTHROPIC_API_KEY を登録すると Claude が執筆する。
          # 未登録なら無料の抽出型＋MyMemory 翻訳で生成される（動作はする）。
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run collect

      - name: 生成物をコミット（アーカイブとして履歴に残す）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          # 変更が無い日はコミットせず正常終了する
          git diff --staged --quiet || git commit -m "記事更新: $(date -u -d '+9 hours' +%Y-%m-%d)"
          git push

      - name: 公開用ディレクトリを組み立て
        # public/ をルートに、data/ をその配下に置く（ローカルサーバーと同じ構成）
        run: |
          mkdir -p _site
          cp -r public/* _site/
          cp -r data _site/data
          # Jekyll による加工を無効化（_ 始まりのファイル等をそのまま配信する）
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # ---- メール通知（MAIL_APP_PASSWORD が未登録なら丸ごとスキップ）----

      - name: メール本文を組み立て
        if: env.MAIL_APP_PASSWORD != ''
        id: mail
        env:
          SITE_URL: https://junjisakanoue-prog.github.io/new-AI-updating/
        run: |
          node scripts/notify-body.mjs > mail.txt
          # 1 行目が件名、2 行目以降が本文
          echo "subject=$(head -1 mail.txt)" >> "$GITHUB_OUTPUT"
          {
            echo 'body<<__MAIL_EOF__'
            tail -n +2 mail.txt
            echo '__MAIL_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: メールで通知
        if: env.MAIL_APP_PASSWORD != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          from: AI Daily Brief <${{ secrets.MAIL_USERNAME }}>
          # MAIL_TO 未設定なら送信元アドレス宛に送る
          to: ${{ secrets.MAIL_TO || secrets.MAIL_USERNAME }}
          subject: ${{ steps.mail.outputs.subject }}
          body: ${{ steps.mail.outputs.body }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
